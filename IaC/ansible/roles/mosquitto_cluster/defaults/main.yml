---
mosquitto_port: 1883

mosquitto_conf_dir: /etc/mosquitto
mosquitto_conf_path: /etc/mosquitto/mosquitto.conf
mosquitto_data_dir: /var/lib/mosquitto
mosquitto_log_dir: /var/log/mosquitto

mosquitto_allow_anonymous: "true"

mosquitto_health_wait: 5
mosquitto_test_topic: "test/cluster"
mosquitto_test_payload: "hello-from-ansible"

mosquitto_dynsec_enabled: true
mosquitto_dynsec_plugin_path: "/usr/lib/mosquitto_dynamic_security.so"
mosquitto_dynsec_config_path: "{{ mosquitto_conf_dir }}/dynsec.json"

mosquitto_dynsec_admin_username: ""
mosquitto_dynsec_admin_password: ""

mosquitto_env: "dev"

mosquitto_tenants:
  - name: "fake"
    backend_clients:
      - username: ""
        password: ""
    gateway_clients:
      - clientid: ""
        username: ""
        password: ""

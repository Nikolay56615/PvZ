---
- name: Ensure apt cache is up to date
  apt:
    update_cache: true
  when: ansible_os_family == "Debian"

- name: Install mosquitto and clients
  apt:
    name:
      - mosquitto
      - mosquitto-clients
    state: present
  when: ansible_os_family == "Debian"

- name: Ensure mosquitto directories exist
  file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ mosquitto_conf_dir }}"
    - "{{ mosquitto_data_dir }}"
    - "{{ mosquitto_log_dir }}"

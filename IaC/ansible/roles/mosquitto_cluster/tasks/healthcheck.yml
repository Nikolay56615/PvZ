---
- name: Ensure we have at least two brokers for cluster check
  assert:
    that:
      - groups['mosquitto_brokers'] | length >= 2
    fail_msg: "Need at least 2 brokers for cluster healthcheck"
  run_once: true

- name: Pick first and second broker for healthcheck
  set_fact:
    mosq_broker_src: "{{ groups['mosquitto_brokers'][0] }}"
    mosq_broker_dst: "{{ groups['mosquitto_brokers'][1] }}"
  run_once: true

- name: Wait a bit after restart
  pause:
    seconds: "{{ mosquitto_health_wait }}"
  run_once: true

- name: Subscribe on dst broker and wait for message
  shell: |
    timeout 10s mosquitto_sub -h {{ hostvars[mosq_broker_dst].ansible_host | default(mosq_broker_dst) }} \
      -p {{ mosquitto_port }} -t "{{ mosquitto_test_topic }}" -C 1
  register: mosq_sub_result
  async: 15
  poll: 0
  delegate_to: localhost
  run_once: true

- name: Publish test message on src broker
  shell: |
    mosquitto_pub -h {{ hostvars[mosq_broker_src].ansible_host | default(mosq_broker_src) }} \
      -p {{ mosquitto_port }} -t "{{ mosquitto_test_topic }}" -m "{{ mosquitto_test_payload }}"
  register: mosq_pub_result
  delegate_to: localhost
  run_once: true

- name: Wait for subscription job to complete
  async_status:
    jid: "{{ mosq_sub_result.ansible_job_id }}"
  register: mosq_sub_final
  until: mosq_sub_final.finished
  retries: 10
  delay: 1
  delegate_to: localhost
  run_once: true

- name: Assert that message was received on dst broker
  assert:
    that:
      - mosq_sub_final.stdout is search(mosquitto_test_payload)
    fail_msg: "Mosquitto cluster healthcheck failed: test message not received on dst broker"
    success_msg: "Mosquitto cluster healthcheck OK: message reached dst broker through bridge"
  run_once: true

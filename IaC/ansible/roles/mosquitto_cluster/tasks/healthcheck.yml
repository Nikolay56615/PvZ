---
- name: Wait a bit after restart
  pause:
    seconds: "{{ mosquitto_health_wait }}"

- name: Test mosquitto local publish/subscribe
  block:
    - name: Start subscriber in background
      shell: |
        timeout 5s mosquitto_sub -h 127.0.0.1 -p {{ mosquitto_port }} \
          -t "{{ mosquitto_test_topic }}" -C 1
      async: 10
      poll: 0
      register: mosq_sub_job

    - name: Publish test message
      shell: |
        mosquitto_pub -h 127.0.0.1 -p {{ mosquitto_port }} \
          -t "{{ mosquitto_test_topic }}" -m "{{ mosquitto_test_payload }}"
      register: mosq_pub_result
      changed_when: false

    - name: Wait for subscriber to receive message
      async_status:
        jid: "{{ mosq_sub_job.ansible_job_id }}"
      register: mosq_sub_final
      until: mosq_sub_final.finished
      retries: 5
      delay: 1

    - name: Assert that subscriber finished successfully
      assert:
        that:
          - mosq_sub_final.rc == 0
        fail_msg: "Mosquitto healthcheck failed on {{ inventory_hostname }}"
        success_msg: "Mosquitto healthcheck OK on {{ inventory_hostname }}"
  rescue:
    - name: Fail explicitly if healthcheck fails
      fail:
        msg: "Mosquitto healthcheck failed on {{ inventory_hostname }}"

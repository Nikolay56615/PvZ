---
- name: Wait a bit for mosquitto to start with dynsec
  pause:
    seconds: "{{ mosquitto_health_wait }}"

- name: Ensure dynsec config directory exists
  file:
    path: "{{ mosquitto_conf_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Check if dynsec config exists
  stat:
    path: "{{ mosquitto_dynsec_config_path }}"
  register: dynsec_stat

- name: Initialize dynsec config and admin user if missing
  command: >
    mosquitto_ctrl dynsec init
    {{ mosquitto_dynsec_config_path }}
    {{ mosquitto_dynsec_admin_username }}
    {{ mosquitto_dynsec_admin_password }}
  when: not dynsec_stat.stat.exists

- name: Fix dynsec permissions
  file:
    path: "{{ mosquitto_dynsec_config_path }}"
    owner: mosquitto
    group: mosquitto
    mode: "0600"
  when: dynsec_stat.stat.exists

- name: Set base mosquitto_ctrl command
  set_fact:
    mosq_ctrl: >-
      mosquitto_ctrl -h 127.0.0.1 -p {{ mosquitto_port }}
      -u {{ mosquitto_dynsec_admin_username }}
      -P {{ mosquitto_dynsec_admin_password }}

- name: Ensure dynsec-admin has role for healthcheck
  command: >
    {{ mosq_ctrl }} dynsec createRole ansible-healthcheck-role
  register: hc_role
  failed_when: >
    hc_role.rc != 0
    and ('Role already exists' not in (hc_role.stderr | default('') ~ hc_role.stdout | default('')))
  changed_when: >
    hc_role.rc == 0
    and ('Role already exists' not in (hc_role.stderr | default('') ~ hc_role.stdout | default('')))

- name: Attach healthcheck role to dynsec-admin
  command: >
    {{ mosq_ctrl }} dynsec addClientRole
    {{ mosquitto_dynsec_admin_username }}
    ansible-healthcheck-role
    1
  register: hc_role_attach
  failed_when: >
    hc_role_attach.rc != 0
    and ('Client already has role' not in (hc_role_attach.stderr | default('') ~ hc_role_attach.stdout | default('')))
  changed_when: >
    hc_role_attach.rc == 0
    and ('Client already has role' not in (hc_role_attach.stderr | default('') ~ hc_role_attach.stdout | default('')))

- name: Ensure healthcheck role ACL for ansible/healthcheck
  command: >
    {{ mosq_ctrl }} dynsec addRoleACL
    ansible-healthcheck-role
    publishClientSend
    'ansible/healthcheck'
    allow
    1
  register: hc_acl
  failed_when: >
    hc_acl.rc != 0
    and ('ACL already exists' not in (hc_acl.stderr | default('') ~ hc_acl.stdout | default('')))
  changed_when: >
    hc_acl.rc == 0
    and ('ACL already exists' not in (hc_acl.stderr | default('') ~ hc_acl.stdout | default('')))
- name: Check dynsec via listClients
  command: "{{ mosq_ctrl }} dynsec listClients"
  register: dynsec_check
  failed_when: dynsec_check.rc != 0
  changed_when: false
---
- name: Wait a bit for mosquitto to start with dynsec
  pause:
    seconds: "{{ mosquitto_health_wait }}"

- name: Ensure dynsec config directory exists
  file:
    path: "{{ mosquitto_conf_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Check if dynsec config exists
  stat:
    path: "{{ mosquitto_dynsec_config_path }}"
  register: dynsec_stat

- name: Initialize dynsec config and admin user if missing
  command: >
    mosquitto_ctrl dynsec init
    {{ mosquitto_dynsec_config_path }}
    {{ mosquitto_dynsec_admin_username }}
    {{ mosquitto_dynsec_admin_password }}
  when: not dynsec_stat.stat.exists

- name: Fix dynsec permissions
  file:
    path: "{{ mosquitto_dynsec_config_path }}"
    owner: mosquitto
    group: mosquitto
    mode: "0600"
  when: dynsec_stat.stat.exists

- name: Set base mosquitto_ctrl command
  set_fact:
    mosq_ctrl: >-
      mosquitto_ctrl -h 127.0.0.1 -p {{ mosquitto_port }}
      -u {{ mosquitto_dynsec_admin_username }}
      -P {{ mosquitto_dynsec_admin_password }}

- name: Check dynsec via listClients
  command: "{{ mosq_ctrl }} dynsec listClients"
  register: dynsec_check
  failed_when: dynsec_check.rc != 0
  changed_when: false

name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]


# sonarqube нужен для статического анализа кода, но чет я не могу получить к нему доступ
# возможно сделаем его self-hosted на сервере
# пока закомментирован

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    name: Detect changed stacks
    runs-on: ubuntu-latest
    outputs:
      py_changed: ${{ steps.changed.outputs.python }}
      ts_changed: ${{ steps.changed.outputs.typescript }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changed
        with:
          filters: |
            python:
              - 'backend/**'
              - '.github/workflows/**'
            typescript:
              - 'frontend/**'
              - '.github/workflows/**'

  python-ci:
    name: Python CI (Poetry)
    needs: detect
    if: ${{ needs.detect.outputs.py_changed == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend/python
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: 1
      POETRY_VIRTUALENVS_IN_PROJECT: true
      POETRY_NO_INTERACTION: 1
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install Poetry via pipx
        run: |
          python -m pip install --upgrade pip
          python -m pip install pipx
          pipx install poetry
          poetry --version
      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: ./backend/python/.venv
          key: venv-${{ runner.os }}-py312-${{ hashFiles('backend/python/poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-py312-
      - name: Install deps
        run: poetry install --no-root
      - name: Static checks (ruff/black/mypy)
        run: |
          poetry run ruff format --check . || true
          poetry run ruff check .
          poetry run black --check .
          poetry run mypy || true
      - name: Tests with coverage
        run: |
          poetry run pytest -q --maxfail=1 --disable-warnings \
            --cov=. --cov-report=xml:coverage.xml
      - name: Upload Python coverage & reports
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: |
            ./backend/python/coverage.xml
            ./backend/python/.ruff_cache/**
            ./backend/python/.mypy_cache/**

    #   - name: SonarQube scan (Python)
    #     if: ${{ secrets.SONAR_TOKEN != '' }}
    #     uses: SonarSource/sonarqube-scan-action@v2
    #     env:
    #       SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
    #       SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    #     with:
    #       projectBaseDir: backend/python
    #       args: >
    #         -Dsonar.projectKey=${{ secrets.SONAR_PY_PROJECT_KEY }}
    #         -Dsonar.projectName=python
    #         -Dsonar.sources=.
    #         -Dsonar.exclusions=**/tests/**
    #         -Dsonar.python.version=3.12
    #         -Dsonar.coverageReportPaths=coverage.xml

  ts-ci:
    name: TypeScript CI
    needs: detect
    if: ${{ needs.detect.outputs.ts_changed == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Lint
        run: npm run lint --if-present
      - name: Typecheck
        run: npm run typecheck --if-present || npx tsc -p tsconfig.json --noEmit
      - name: Test with coverage
        run: npm test --if-present -- --coverage || echo "no tests"
      - name: Upload TS coverage & reports
        uses: actions/upload-artifact@v4
        with:
          name: ts-coverage
          path: |
            ./frontend/coverage/lcov.info
            ./frontend/coverage/**


    #   - name: SonarQube scan (TS)
    #     if: ${{ secrets.SONAR_TOKEN != '' }}
    #     uses: SonarSource/sonarqube-scan-action@v2
    #     env:
    #       SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
    #       SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    #     with:
    #       projectBaseDir: frontend
    #       args: >
    #         -Dsonar.projectKey=${{ secrets.SONAR_TS_PROJECT_KEY }}
    #         -Dsonar.projectName=frontend
    #         -Dsonar.sources=src
    #         -Dsonar.tests=src
    #         -Dsonar.test.inclusions=**/*.test.ts,**/*.spec.ts,**/*.test.tsx,**/*.spec.tsx
    #         -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info

  nothing-to-do:
    needs: detect
    if: ${{ needs.detect.outputs.py_changed != 'true' && needs.detect.outputs.ts_changed != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - run: echo "No relevant changes detected."

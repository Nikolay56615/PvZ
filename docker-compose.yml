services:
  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: dev
    expose:
      - "8001"

  frontend:
    build:
      context: ./frontend-app
    expose:
      - "80"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
